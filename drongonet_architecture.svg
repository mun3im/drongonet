<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 806"
     width="800" height="806">

  <defs>
    <!-- Arrowhead marker -->
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="7" markerHeight="7"
            orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#9CA3AF"/>
    </marker>
    <!-- Subtle drop-shadow for column header boxes -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.13" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="800" height="806" fill="white"/>

  <!-- ══════════════════════════════════════════════════════
       TITLE
  ══════════════════════════════════════════════════════ -->
  <text x="400" y="34"
        text-anchor="middle"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="17" font-weight="bold" fill="#111827">
    DrongoNet Architecture
  </text>

  <!-- ══════════════════════════════════════════════════════
       COLUMN HEADERS
  ══════════════════════════════════════════════════════ -->

  <!-- Micro header -->
  <rect x="96" y="50" width="208" height="58" rx="7"
        fill="#1E40AF" filter="url(#shadow)"/>
  <text x="200" y="71" text-anchor="middle"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="13" font-weight="bold" fill="white">DrongoNet-Micro</text>
  <text x="200" y="86" text-anchor="middle"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="8" fill="#BFDBFE">919 params · 6.56 kB (INT8) · AUC 0.9743 ± 0.0011</text>
  <text x="200" y="100" text-anchor="middle"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="8" fill="#BFDBFE">n_mels=16 · n_fft=1024 · hop=256 · 0.10 ms (ARM Cortex-M4)</text>

  <!-- Edge header -->
  <rect x="496" y="50" width="208" height="58" rx="7"
        fill="#991B1B" filter="url(#shadow)"/>
  <text x="600" y="71" text-anchor="middle"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="13" font-weight="bold" fill="white">DrongoNet-Edge</text>
  <text x="600" y="86" text-anchor="middle"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="8" fill="#FECACA">25,890 params · 33.06 kB (INT8) · AUC 0.9992 ± 0.0002</text>
  <text x="600" y="100" text-anchor="middle"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="8" fill="#FECACA">n_mels=80 · n_fft=1024 · hop=256 · 1.15 ms (Linux SBC)</text>

  <!-- Centre dashed divider -->
  <line x1="400" y1="50" x2="400" y2="748"
        stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="6,5"/>

  <!-- "OR" badge between the two columns -->
  <circle cx="400" cy="116" r="13" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="400" y="120" text-anchor="middle"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="9" font-weight="bold" fill="#6B7280">OR</text>

  <!-- ══════════════════════════════════════════════════════
       HELPER DEFINITIONS (colours used below)

       INPUT    #DBEAFE / #3B82F6
       FREQ_EMPH #CCFBF1 / #0D9488
       CONV      #FED7AA / #EA580C
       CONV_PW   #FFEDD5 / #C2410C  (dashed border)
       MAXPOOL   #EDE9FE / #7C3AED
       GAP       #D1FAE5 / #059669
       DENSE     #FCE7F3 / #DB2777
       DROPOUT   #F3F4F6 / #6B7280
       OUTPUT    #FEF3C7 / #D97706
  ══════════════════════════════════════════════════════ -->


